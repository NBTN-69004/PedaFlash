<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedaflash</title>

<style>
body{
  margin:0;
  background:#090909;
  color:#f0ece0;
  font-family:Arial;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}
.logo{
  font-size:28px;
}
.logo span{color:#f5e642;}

/* FILTER */
.filters{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.filter{
  padding:8px 12px;
  background:#222;
  cursor:pointer;
}
.active{background:#f5e642;color:#000;}

/* CATALOG */
.catalog{
  display:flex;
  gap:15px;
  overflow-x:auto;
  margin-bottom:20px;
}

.card{
  min-width:220px;
  background:#111;
  padding:15px;
  cursor:pointer;
  border:1px solid #333;
  transition:.2s;
}
.card:hover{transform:scale(1.05);}
.card small{color:#777;}

/* VIEWER */
.viewer{
  height:400px;
  background:#000;
}

iframe{width:100%;height:100%;border:none;}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">PEDA<span>FLASH</span></div>
  <div id="date"></div>
</div>

<div class="filters">
  <div class="filter active" onclick="filterType('all')">Tout</div>
  <div class="filter" onclick="filterType('artefact')">Artefact</div>
  <div class="filter" onclick="filterType('podcast')">Podcast</div>
  <div class="filter" onclick="filterType('ressource')">PDF</div>
  <div class="filter" onclick="filterType('padlet')">Padlet</div>
</div>

<div class="catalog" id="catalog"></div>

<h2 id="title"></h2>
<p id="desc"></p>

<div class="viewer" id="viewer"></div>

</div>

<script>

/* DATE */
document.getElementById("date").innerText =
new Date().toLocaleDateString("fr-FR");

/* DATA */
let DATA = [];

/* LOAD JSON */
fetch("./data/content.json")
.then(r=>r.json())
.then(d=>{
  DATA = d.items;
  renderCatalog(DATA);
  loadItem(DATA[0]);
});

/* RENDER */
function renderCatalog(items){
  const cat = document.getElementById("catalog");
  cat.innerHTML = "";

  items.forEach(item=>{
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <strong>${item.title}</strong><br>
      <small>${item.type}</small>
    `;

    el.onclick = ()=>loadItem(item);

    cat.appendChild(el);
  });
}

/* FILTER */
function filterType(type){
  document.querySelectorAll(".filter").forEach(f=>f.classList.remove("active"));
  event.target.classList.add("active");

  if(type==="all"){
    renderCatalog(DATA);
  } else {
    renderCatalog(DATA.filter(i=>i.type===type));
  }
}

/* LOAD ITEM */
function loadItem(item){

  document.getElementById("title").innerText = item.title;
  document.getElementById("desc").innerText = item.description;

  const viewer = document.getElementById("viewer");
  viewer.innerHTML = "";

  let url = item.url;

  if(item.type==="podcast"){
    viewer.innerHTML = `<audio controls style="width:100%"><source src="${url}"></audio>`;
    return;
  }

  if(item.type==="ressource" && url.includes("docs.google.com")){
    url = url.replace("/edit","/preview");
  }

  viewer.innerHTML = `<iframe src="${url}"></iframe>`;
}

</script>

</body>
</html>
