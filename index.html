<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedaflash</title>

<style>
/* ⚠️ CORRECTION GUILLEMETS (IMPORTANT) */
body {
background:#090909;
color:#f0ece0;
font-family:'DM Sans', sans-serif;
margin:0;
}

/* (⚡ ton CSS complet inchangé — je simplifie ici pour lisibilité) */
</style>
</head>

<body>

<div class="pf-panel">

<!-- HEADER -->
<h1 id="headline">Chargement...</h1>
<p id="desc">Chargement...</p>

<!-- INPUT -->
<input id="url-a" type="text">
<button onclick="loadEmbed('a')">Charger</button>

<!-- EMBED -->
<div id="wrap-a"></div>

</div>

<script>

/* =========================
   🔥 EMBED (TON CODE CLEAN)
========================= */

function loadEmbed(k) {
  let url = document.getElementById('url-' + k).value.trim();
  if (!url) return;

  if (!url.startsWith('http')) {
    url = 'https://' + url;
  }

  const wrap = document.getElementById('wrap-' + k);

  wrap.innerHTML = '';

  const iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.style.width = "100%";
  iframe.style.height = "400px";
  iframe.style.border = "none";

  wrap.appendChild(iframe);
}

/* =========================
   🚀 ZAPIER AUTO LOAD
========================= */

document.addEventListener("DOMContentLoaded", () => {

  fetch('./data/latest.json')
    .then(res => res.json())
    .then(data => {

      console.log("DATA:", data);

      // Texte
      document.getElementById('headline').innerText = data.title;
      document.getElementById('desc').innerText = data.description;

      // Auto artefact
      if (data.type === "artefact") {
        document.getElementById('url-a').value = data.url;

        // 🔥 AUTO LOAD
        loadEmbed('a');
      }

    })
    .catch(err => {
      console.error("Erreur JSON :", err);
    });

});

</script>

</body>
</html>
