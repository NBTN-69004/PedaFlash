<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedaflash</title>

<style>
body{
  margin:0;
  background:#090909;
  color:#f0ece0;
  font-family:Arial, sans-serif;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{color:#f5e642;}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab{
  padding:10px;
  background:#222;
  cursor:pointer;
}

.active{background:#f5e642;color:#000;}

input{
  width:70%;
  padding:10px;
  background:#111;
  border:1px solid #333;
  color:white;
}

button{
  padding:10px;
  background:#f5e642;
  border:none;
  cursor:pointer;
}

.viewer{
  margin-top:20px;
  height:400px;
  background:#000;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Chargement...</h1>
<p id="desc"></p>

<div class="tabs">
  <div class="tab active" onclick="setType('artefact')">Artefact</div>
  <div class="tab" onclick="setType('podcast')">Podcast</div>
  <div class="tab" onclick="setType('ressource')">Ressource</div>
  <div class="tab" onclick="setType('padlet')">Padlet</div>
</div>

<input id="url" placeholder="URL...">
<button onclick="load()">Charger</button>

<div class="viewer" id="viewer"></div>

</div>

<script>

let currentType = "artefact";

/* 🔥 CHANGER TYPE */
function setType(type){
  currentType = type;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
}

/* 🔥 CHARGER CONTENU */
function load(){
  let url = document.getElementById("url").value.trim();
  if(!url) return;

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  const viewer = document.getElementById("viewer");
  viewer.innerHTML = "";

  if(currentType === "podcast"){
    viewer.innerHTML = `<audio controls style="width:100%"><source src="${url}"></audio>`;
    return;
  }

  if(currentType === "ressource"){
    if(url.includes("docs.google.com")){
      url = url.replace("/edit","/preview");
    }
  }

  viewer.innerHTML = `<iframe src="${url}"></iframe>`;
}

/* 🚀 AUTO LOAD JSON */
document.addEventListener("DOMContentLoaded", ()=>{

  fetch("./data/content.json")
    .then(res=>res.json())
    .then(data=>{

      if(!data.items || data.items.length === 0) return;

      const item = data.items[0];

      document.getElementById("title").innerText = item.title || "";
      document.getElementById("desc").innerText = item.description || "";
      document.getElementById("url").value = item.url || "";

      currentType = item.type;

      load();

    })
    .catch(err=>{
      console.log("Erreur JSON", err);
    });

});

</script>

</body>
</html>
