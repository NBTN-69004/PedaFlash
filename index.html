<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="theme-color" content="#090909">

<title>Pedaflash</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #090909;
  color: #f0ece0;
  font-family: 'DM Sans', sans-serif;
  padding: 2rem;
  display: flex;
  justify-content: center;
}

.pf-panel {
  max-width: 900px;
  width: 100%;
  background: #161616;
  border: 1px solid #2a2a2a;
}

.pf-top-bar {
  height: 3px;
  background: #f5e642;
}

.pf-header {
  display: flex;
  border-bottom: 1px solid #2a2a2a;
}

.pf-logo {
  padding: 1.5rem;
  border-right: 1px solid #2a2a2a;
}

.pf-logo-title {
  font-family: 'Bebas Neue';
  font-size: 2.8rem;
}

.acc {
  color: #f5e642;
}

.pf-meta {
  padding: 1rem;
  flex: 1;
}

.pf-tabs {
  display: flex;
  background: #111;
}

.pf-tab {
  flex: 1;
  padding: 0.8rem;
  cursor: pointer;
  border-right: 1px solid #2a2a2a;
  font-size: 0.7rem;
}

.pf-tab.active {
  background: #f5e642;
  color: #000;
}

.pf-content {
  padding: 1.5rem;
}

.pf-headline {
  font-size: 2rem;
  margin-bottom: 1rem;
}

.pf-desc {
  color: #888;
  margin-bottom: 1rem;
}

.pf-input {
  width: 100%;
  padding: 0.5rem;
  margin-bottom: 1rem;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  color: #fff;
}

.pf-btn {
  padding: 0.5rem 1rem;
  background: #f5e642;
  border: none;
  cursor: pointer;
}

.pf-embed {
  height: 380px;
  background: #000;
  margin-top: 1rem;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.pf-footer {
  padding: 1rem;
  border-top: 1px solid #2a2a2a;
  font-size: 0.7rem;
  color: #666;
}

</style>
</head>

<body>

<div class="pf-panel">

<div class="pf-top-bar"></div>

<div class="pf-header">
  <div class="pf-logo">
    <div class="pf-logo-title">PEDA<span class="acc">FLASH</span></div>
  </div>
  <div class="pf-meta">
    <div id="date"></div>
  </div>
</div>

<div class="pf-tabs">
  <div class="pf-tab active" onclick="setType('artefact')">⚡ Artefact</div>
  <div class="pf-tab" onclick="setType('podcast')">🎧 Podcast</div>
  <div class="pf-tab" onclick="setType('ressource')">📖 Ressource</div>
</div>

<div class="pf-content">

  <div class="pf-headline" id="title">Chargement...</div>
  <div class="pf-desc" id="desc"></div>

  <input class="pf-input" id="urlInput" placeholder="Colle une URL ici">
  <button class="pf-btn" onclick="loadContent()">Charger</button>

  <div class="pf-embed" id="embed"></div>

</div>

<div class="pf-footer">
  Pedaflash · Formation · Nicolas Narbonnet
</div>

</div>

<script>

// DATE
const now = new Date();
document.getElementById('date').innerText =
  now.toLocaleDateString('fr-FR');

// TYPE
let currentType = "artefact";

function setType(type) {
  currentType = type;
  document.querySelectorAll('.pf-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}

// LOAD CONTENT
function loadContent() {
  let url = document.getElementById('urlInput').value;

  if (!url.startsWith('http')) {
    url = "https://" + url;
  }

  const embed = document.getElementById('embed');

  if (currentType === "podcast") {
    embed.innerHTML = `<audio controls style="width:100%"><source src="${url}"></audio>`;
  } else {
    embed.innerHTML = `<iframe src="${url}"></iframe>`;
  }
}

// AUTO LOAD JSON
fetch('data/latest.json')
.then(res => res.json())
.then(data => {

  document.getElementById('title').innerText = data.title;
  document.getElementById('desc').innerText = data.description;
  document.getElementById('urlInput').value = data.url;

});

</script>

</body>
</html>
