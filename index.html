<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedaflash</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

/* RESET CLEAN */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* BODY */
body {
  background: #090909;
  color: #f0ece0;
  font-family: 'DM Sans', sans-serif;
  padding: 2rem;
  display: flex;
  justify-content: center;
}

/* PANEL */
.pf-panel {
  width: 100%;
  max-width: 900px;
  background: #161616;
  border: 1px solid #2a2a2a;
}

/* TOP BAR */
.pf-top-bar {
  height: 3px;
  background: #f5e642;
}

/* HEADER */
.pf-header {
  display: flex;
  border-bottom: 1px solid #2a2a2a;
}

.pf-logo {
  padding: 1.2rem;
  border-right: 1px solid #2a2a2a;
}

.pf-logo-title {
  font-family: 'Bebas Neue';
  font-size: 2.5rem;
}

.acc {
  color: #f5e642;
}

.pf-meta {
  padding: 1rem;
  flex: 1;
  display: flex;
  align-items: center;
}

/* CONTENT */
.pf-content {
  padding: 1.5rem;
}

.pf-headline {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}

.pf-desc {
  color: #888;
  margin-bottom: 1rem;
}

/* INPUT */
.pf-input {
  width: 70%;
  padding: 0.6rem;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  color: white;
}

/* BUTTON */
.pf-btn {
  padding: 0.6rem 1rem;
  background: #f5e642;
  border: none;
  cursor: pointer;
}

/* EMBED */
.pf-embed {
  width: 100%;
  height: 420px; /* 🔥 important */
  background: #000;
  margin-top: 1rem;
}

.pf-embed iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* MESSAGE BLOQUÉ */
.pf-blocked {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
  color:#aaa;
  text-align:center;
}

</style>
</head>

<body>

<div class="pf-panel">

  <div class="pf-top-bar"></div>

  <div class="pf-header">
    <div class="pf-logo">
      <div class="pf-logo-title">
        PEDA<span class="acc">FLASH</span>
      </div>
    </div>
    <div class="pf-meta">
      <span id="dateDisplay"></span>
    </div>
  </div>

  <div class="pf-content">

    <div class="pf-headline" id="headline">Chargement...</div>
    <div class="pf-desc" id="desc">Veuillez patienter...</div>

    <input class="pf-input" id="url-a" placeholder="Collez une URL">
    <button class="pf-btn" onclick="loadEmbed('a')">Charger</button>

    <div class="pf-embed" id="wrap-a"></div>

  </div>

</div>

<script>

/* DATE */
const now = new Date();
document.getElementById('dateDisplay').innerText =
  now.toLocaleDateString('fr-FR');

/* EMBED INTELLIGENT */
function loadEmbed(k) {
  let url = document.getElementById('url-' + k).value.trim();
  if (!url) return;

  if (!url.startsWith('http')) {
    url = 'https://' + url;
  }

  const wrap = document.getElementById('wrap-' + k);

  const blockedSites = [
    "replit",
    "notion",
    "docs.google.com",
    "drive.google.com"
  ];

  const isBlocked = blockedSites.some(site => url.includes(site));

  if (isBlocked) {
    wrap.innerHTML = `
      <div class="pf-blocked">
        <p>🚫 Ce contenu ne peut pas être intégré</p>
        <button onclick="window.open('${url}','_blank')" class="pf-btn">
          Ouvrir dans un onglet ↗
        </button>
      </div>
    `;
  } else {
    wrap.innerHTML = `<iframe src="${url}"></iframe>`;
  }
}

/* AUTO LOAD JSON */
document.addEventListener("DOMContentLoaded", () => {
  fetch('data/latest.json')
    .then(res => res.json())
    .then(data => {

      document.getElementById('headline').innerText = data.title;
      document.getElementById('desc').innerText = data.description;

      if (data.type === "artefact") {
        document.getElementById('url-a').value = data.url;

        // 🔥 AUTO LOAD
        loadEmbed('a');
      }

    })
    .catch(err => {
      console.error("Erreur JSON :", err);
    });
});

</script>

</body>
</html>
